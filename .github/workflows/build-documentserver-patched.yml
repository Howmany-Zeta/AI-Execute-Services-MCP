# 方案 A：官方镜像 + patch 覆盖构建 DocumentServer
# 当 DocumentServer/ 变更时触发，构建并推送到 GHCR

name: Build DocumentServer (Patched)

on:
  push:
    paths:
      - 'DocumentServer/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build DocumentServer image
        uses: docker/build-push-action@v5
        with:
          context: ./DocumentServer
          file: ./DocumentServer/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/documentserver-patched:latest
            ghcr.io/${{ github.repository_owner }}/documentserver-patched:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
