<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnlyOffice 并发限制手动测试</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    h1 { font-size: 1.2rem; }
    .link { display: block; margin: 0.5rem 0; padding: 0.5rem; background: #f0f0f0; border-radius: 4px; }
    .link a { color: #0066cc; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; margin: 0.5rem 0.25rem 0.5rem 0; }
    #count { width: 4em; padding: 0.5rem; }
    .hint { color: #666; font-size: 0.9rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>OnlyOffice 并发限制手动测试</h1>
  <p>验证 patch 后第 21+ 个编辑器连接是否正常。</p>

  <label>DocumentServer 地址: <input id="base" value="http://127.0.0.1:8081" style="width: 220px" /></label><br>
  <label>打开数量: <input id="count" type="number" value="25" min="21" max="50" /></label><br>

  <button onclick="openAll()">批量打开编辑器标签页</button>
  <button onclick="copyLinks()">复制链接到剪贴板</button>

  <div class="hint">
    <p><strong>步骤：</strong></p>
    <ol>
      <li>确保 DocumentServer 和 ds:example 已启动</li>
      <li>点击「批量打开编辑器标签页」或「复制链接」后手动打开</li>
      <li>检查第 21、22、23… 个标签页是否正常加载编辑器</li>
      <li>若第 21 个起出现 "Connection limit" 等错误，则 patch 未生效</li>
    </ol>
  </div>

  <script>
    function base() { return document.getElementById('base').value.replace(/\/$/, ''); }
    function count() { return parseInt(document.getElementById('count').value, 10) || 25; }

    function openAll() {
      const n = count();
      const t = Date.now();
      for (let i = 0; i < n; i++) {
        const url = `${base()}/example/editor?fileExt=docx&_t=${t}-${i}`;
        window.open(url, `doc-${i}`, 'noopener');
      }
      alert(`已尝试打开 ${n} 个标签页，请检查第 21+ 个是否正常`);
    }

    function copyLinks() {
      const n = count();
      const t = Date.now();
      const urls = Array.from({ length: n }, (_, i) =>
        `${base()}/example/editor?fileExt=docx&_t=${t}-${i}`
      );
      navigator.clipboard.writeText(urls.join('\n')).then(
        () => alert(`已复制 ${n} 个链接到剪贴板，可逐行打开测试`),
        () => alert('复制失败，请手动打开')
      );
    }
  </script>
</body>
</html>
