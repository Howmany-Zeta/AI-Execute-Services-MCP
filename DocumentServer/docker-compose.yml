# AIECS 预构建 DocumentServer（品牌与并发等已在镜像内完成）
# 镜像构建与补丁流程见仓库 AI-Execute-Services-Doc
#
# 使用前需能拉取 Artifact Registry（gcloud auth configure-docker us-central1-docker.pkg.dev）
#
#   cp .env.example .env   # 可选：覆盖 JWT、镜像 tag、端口
#   docker compose pull
#   docker compose up -d

services:
  documentserver:
    image: ${DOCUMENTSERVER_IMAGE:-us-central1-docker.pkg.dev/ca-biz-kjmsdw-y59m/aiecs-mcp-servers/aiecs-documentserver:latest}
    container_name: aiecs-documentserver
    restart: unless-stopped
    ports:
      - "${DS_HTTP_PORT:-8080}:80"
      - "${DS_HTTPS_PORT:-8443}:443"
    environment:
      - JWT_ENABLED=${JWT_ENABLED:-true}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
    volumes:
      - documentserver_data:/var/www/onlyoffice/Data
      - documentserver_logs:/var/log/onlyoffice
    networks:
      - aiecs-documentserver-network

volumes:
  documentserver_data:
  documentserver_logs:

networks:
  aiecs-documentserver-network:
    driver: bridge
