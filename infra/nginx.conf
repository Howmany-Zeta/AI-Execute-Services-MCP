events {
    worker_connections 1024;
}

http {
   
    client_max_body_size 60M;

    # Docker internal DNS resolver for dynamic upstream resolution
    # This allows nginx to re-resolve container IPs when they change (e.g., after restart)
    # valid=10s: Cache DNS results for 10 seconds, then re-resolve
    # ipv6=off: Disable IPv6 to avoid resolution issues in Docker networks
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # 1. HTTP - Redirect to HTTPS
    server {
        listen 80;
        server_name startudiscovery.com www.startudiscovery.com;

        # Certbot verification path (for certificate renewal)
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS Configuration
    server {
        listen 443 ssl;
        server_name startudiscovery.com www.startudiscovery.com;

        # SSL Certificate paths (container paths)
        ssl_certificate     /etc/letsencrypt/live/startudiscovery.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/startudiscovery.com/privkey.pem;

        # SSL security optimization
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;


        # Dynamic upstream variables for container name resolution
        # Using variables forces nginx to re-resolve DNS on each request
        set $upstream_auth_chatbot auth-chatbot-dev:3000;
        set $upstream_express_gateway express-gateway-dev:3001;

        # API routes - proxy to express-gateway
        location /api/v1/ {
            proxy_pass http://$upstream_express_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

       # WebSocket support for Next.js HMR (development)
        location /_next/webpack-hmr {
            proxy_pass http://$upstream_auth_chatbot;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # All other routes - proxy to auth-chatbot (Next.js)
        location / {
            proxy_pass http://$upstream_auth_chatbot;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
